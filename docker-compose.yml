version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=echoforge
      - POSTGRES_PASSWORD=echoforge_dev
      - POSTGRES_DB=echoforge
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ECHO_FORGE_DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: echoforge
      POSTGRES_PASSWORD: echoforge_dev
      POSTGRES_DB: echoforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  worker:
    build: .
    command: >
      python -c "
      import asyncio
      from app.workers.jobs import warm_cache
      asyncio.run(warm_cache())
      print('Cache warm complete.')
      "
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=echoforge
      - POSTGRES_PASSWORD=echoforge_dev
      - POSTGRES_DB=echoforge
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
